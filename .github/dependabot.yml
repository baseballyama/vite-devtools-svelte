version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      vite:
        patterns:
          - "vite"
          - "vite-*"
          - "@vitejs/*"
      svelte:
        patterns:
          - "svelte"
          - "@sveltejs/*"
      types:
        patterns:
          - "@types/*"
      dev:
        dependency-type: development
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - ci
      - dependencies
