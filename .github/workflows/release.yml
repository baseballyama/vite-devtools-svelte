name: Release

# Changesets-driven publish.
#
# Flow:
#   1. PRs land on main with a `.changeset/*.md` file describing the bump.
#   2. This workflow opens (or updates) a "Version Packages" PR that bumps
#      package.json + CHANGELOG.md and removes consumed changesets.
#   3. Merging that PR re-runs this workflow, which now finds no pending
#      changesets and instead publishes to npm with provenance and creates
#      a GitHub Release for each version bump.
#
# Authentication:
#   Publishing uses npm Trusted Publishers (OIDC). The package on npm must be
#   configured to trust this repo + workflow at
#   https://www.npmjs.com/package/vite-devtools-svelte/access. No NPM_TOKEN
#   secret is needed; OIDC is brokered via the `id-token: write` permission
#   below.
#
# Required repo settings:
#   - Settings → Actions → General → Workflow permissions:
#     "Read and write permissions" + "Allow GitHub Actions to create and
#     approve pull requests" (so changesets/action can open the release PR
#     and create GitHub Releases).

on:
  push:
    branches:
      - main

permissions:
  contents: write       # create/merge release PR, push tags, GitHub Releases
  pull-requests: write  # open the "Version Packages" PR
  id-token: write       # OIDC for npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      # Use Node 24 here, not 22. `changeset publish` shells out to
      # `npm publish`, and OIDC Trusted Publishers require npm CLI >= 11.5.1.
      # Node 22 ships with npm 10.x; Node 24 ships with npm 11.x, so the OIDC
      # publish path works out of the box without a separate npm install step.
      #
      # Note: do NOT set `registry-url` here — it would have setup-node write
      # `_authToken=${NODE_AUTH_TOKEN}` into .npmrc, which forces token auth
      # and blocks the OIDC code path used by Trusted Publishers.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm -C packages/vite-devtools-svelte test
      - run: pnpm build

      - name: Create Release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm release
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
