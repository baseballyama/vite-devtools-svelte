<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Svelte DevTools plugin for Vite DevTools — 15 specialized panels for debugging, profiling, and inspecting Svelte and SvelteKit applications."
    />
    <meta property="og:title" content="vite-devtools-svelte" />
    <meta
      property="og:description"
      content="DevTools for Svelte, inside Vite. 15 panels for profiling, inspection, and debugging."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=DM+Sans:opsz,wght@9..40,300..700&family=JetBrains+Mono:wght@400..700&display=swap"
    />
    <script>
      ;(() => {
        const stored = localStorage.getItem('theme')
        const valid = stored === 'dark' || stored === 'light' ? stored : null
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const theme = valid ?? (prefersDark ? 'dark' : 'light')
        const root = document.documentElement
        if (root.dataset.theme !== theme) root.dataset.theme = theme
      })()
    </script>
    %sveltekit.head%
  </head>
  <body>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
