<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Svelte DevTools plugin for Vite DevTools — 15 specialized panels for debugging, profiling, and inspecting Svelte and SvelteKit applications." />
    <meta property="og:title" content="vite-devtools-plugin-svelte" />
    <meta property="og:description" content="DevTools for Svelte, inside Vite. 15 panels for profiling, inspection, and debugging." />
    <meta property="og:type" content="website" />
    <script>
      ;(() => {
        const stored = localStorage.getItem('theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const theme = stored ?? (prefersDark ? 'dark' : 'light')
        document.documentElement.dataset.theme = theme
      })()
    </script>
    %sveltekit.head%
  </head>
  <body>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
